<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martinez’s Flower Designs 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#e6f2ff;
font-family:'Pacifico';
}

/* APP */
.app{
max-width:430px;
margin:auto;
background:white;
min-height:100vh;
border-radius:30px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,0,0,0.15);
}

/* HEADER */
.header{
background:#2f5fbf;
color:white;
padding:18px;
text-align:center;
font-size:20px;
}

/* PAGES */
.page{
display:none;
padding:20px;
padding-bottom:100px;
}
.active{display:block;}

/* CARD */
.card{
background:#f8fbff;
margin:12px 0;
padding:18px;
border-radius:20px;
}

/* BUTTONS */
button{
background:#4d8dff;
color:white;
border:none;
padding:12px;
border-radius:15px;
margin:6px 0;
width:100%;
}

/* INPUTS */
input,textarea,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid #d0e2ff;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
max-width:430px;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}
.nav button{
background:none;
color:#2f5fbf;
font-size:12px;
}

/* RECEIPT */
.receipt{
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-top:10px;
}

.line{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.total{
border-top:1px solid #ddd;
margin-top:10px;
padding-top:10px;
font-weight:bold;
font-size:18px;
}

.small{
font-size:13px;
color:gray;
}

.del{
background:#ff4d4d;
font-size:11px;
padding:4px 6px;
border-radius:6px;
margin-left:6px;
}

/* APPLE PAY STYLE BUTTON */
.apple{
background:black;
border-radius:20px;
}

.tiktok{
box-shadow:0 0 10px #4d8dff;
}
</style>
</head>

<body>

<div class="app">

<div class="header">💙 Martinez’s Flowers</div>

<script>
let cart=[];
let finalText="";

function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function price(t){
return {
Tulips:1.2,Daisies:1.1,Hibiscus:1.8,Lilies:1.7,"Tiger Lilies":1.9
}[t];
}

function add(n,p,q){
cart.push({n,p,q});
update();
}

function removeItem(i){
cart.splice(i,1);
update();
}

function calc(){
est.innerText="Estimated: $"+Math.round(qty.value*price(type.value));
}

function addCustom(){
if(!qty.value)return;
cart.push({n:type.value,p:Math.round(qty.value*price(type.value)),q:qty.value});
update();
}

function addMix(){
let total=0;
function line(n,q){ if(q>0) total+=Math.round(q*price(n)); }

line("Tulips",tulipQty.value);
line("Daisies",daisyQty.value);
line("Hibiscus",hibiscusQty.value);
line("Lilies",lilyQty.value);
line("Tiger Lilies",tigerQty.value);

if(total===0){alert("Add flowers 💙");return;}

cart.push({n:"Custom Bouquet",p:total,q:1});
update();
}

function update(){
let html="";
let total=0;

cart.forEach((i,index)=>{
html+=`<div class="line">
<span>${i.q}x ${i.n}</span>
<span>$${i.p} <button class="del" onclick="removeItem(${index})">x</button></span>
</div>`;
total+=i.p;
});

if(msg.value){
html+=`<div class="line"><span>Decor/Message</span><span>$5</span></div>`;
total+=5;
}

summary.innerHTML=html || "No items yet";
totalEl.innerText="$"+total;
}

/* FINAL RECEIPT */
function finalizeOrder(){
if(cart.length===0){alert("Add items 💙");return;}

let total=0;
let html="";

cart.forEach(i=>{
html+=`<div class="line"><span>${i.q}x ${i.n}</span><span>$${i.p}</span></div>`;
total+=i.p;
});

if(msg.value){
html+=`<div class="line"><span>Decor/Message</span><span>$5</span></div>`;
total+=5;
}

let info=`
<div class="small">📦 ${method.value}</div>
<div class="small">📅 ${date.value} ${time.value}</div>
<div class="small">💳 ${paymentMethod.value}</div>
`;

let totalHTML=`<div class="total">Total: $${total}</div>`;

finalSummary.innerHTML = `<div class="receipt">${html}${info}${totalHTML}</div>`;

/* TEXT VERSION FOR SENDING */
let text="🧾 Martinez’s Flowers Receipt\n\n";
cart.forEach(i=> text+=`${i.q}x ${i.n} - $${i.p}\n`);
if(msg.value){text+="\n+ $5 Message";}
text+=`\n\n${method.value} | ${date.value} ${time.value}`;
text+=`\nPayment: ${paymentMethod.value}`;
text+=`\nTotal: $${total}`;

finalText=text;
}
</script>

<!-- HOME -->
<div id="home" class="page active">
<h3>🌼 My Story</h3>
<p>I’ve always been the kind of person who jumps from hobby to hobby...</p>
</div>

<!-- FLOWERS -->
<div id="flowers" class="page">

<div class="card">
<h3>🌷 Tulips</h3>
<button onclick="add('Tulips',9,7)">7 $9</button>
<button onclick="add('Tulips',16,15)">15 $16</button>
<button onclick="add('Tulips',28,25)">25 $28</button>
</div>

<div class="card">
<h3>🌼 Daisies</h3>
<button onclick="add('Daisies',8,7)">7 $8</button>
<button onclick="add('Daisies',15,15)">15 $15</button>
<button onclick="add('Daisies',27,25)">25 $27</button>
</div>

<div class="card">
<h3>🌺 Hibiscus</h3>
<button onclick="add('Hibiscus',12,7)">7 $12</button>
<button onclick="add('Hibiscus',22,15)">15 $22</button>
<button onclick="add('Hibiscus',40,25)">25 $40</button>
</div>

<div class="card">
<h3>🤍 Lilies</h3>
<button onclick="add('Lilies',12,7)">7 $12</button>
<button onclick="add('Lilies',23,15)">15 $23</button>
<button onclick="add('Lilies',42,25)">25 $42</button>
</div>

<div class="card">
<h3>🐯 Tiger Lilies</h3>
<button onclick="add('Tiger Lilies',13,7)">7 $13</button>
<button onclick="add('Tiger Lilies',25,15)">15 $25</button>
<button onclick="add('Tiger Lilies',45,25)">25 $45</button>
</div>

</div>

<!-- ORDER -->
<div id="order" class="page">
<div class="card">

<select id="method">
<option>Pickup</option>
<option>Delivery</option>
</select>

<input type="date" id="date">
<input type="time" id="time">

<textarea id="msg" placeholder="Message (+$5)"></textarea>

<select id="paymentMethod">
<option>Apple Pay</option>
<option>Zelle</option>
<option>Cash</option>
<option>PayPal</option>
</select>

</div>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">

<div class="receipt" id="summary"></div>
<div class="total" id="totalEl">$0</div>

<button class="apple" onclick="finalizeOrder()"> Pay</button>
<button onclick="copy()">Copy Order</button>
<button onclick="send()">Send Order</button>

<div id="finalSummary"></div>

</div>

<!-- CONTACT -->
<div id="contact" class="page">
<button class="tiktok" onclick="window.open('https://www.tiktok.com/@martinezs.flowers?_r=1&_t=ZT-95flhn8xJzp')">
💙 Open My TikTok
</button>
</div>

</div>

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('flowers')">Shop</button>
<button onclick="show('order')">Order</button>
<button onclick="show('payment')">Cart</button>
<button onclick="show('contact')">Contact</button>
</div>

<script>
function copy(){
navigator.clipboard.writeText(finalText);
alert("Copied 💙");
}

function send(){
window.open("sms:2017365461&body="+encodeURIComponent(finalText));
}
</script>

</body>
</html>
