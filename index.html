<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martinez’s Flower Designs 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#e6f2ff;
font-family:'Pacifico';
}

/* APP */
.app{
max-width:430px;
margin:auto;
background:white;
min-height:100vh;
border-radius:30px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,0,0,0.15);
}

/* HEADER */
.header{
background:#2f5fbf;
color:white;
padding:18px;
text-align:center;
font-size:20px;
}

/* PAGES */
.page{
display:none;
padding:20px;
padding-bottom:90px;
text-align:center;
}
.active{display:block;}

/* CARD */
.card{
background:#f8fbff;
margin:12px auto;
padding:18px;
border-radius:20px;
}

/* BUTTONS */
button{
background:#4d8dff;
color:white;
border:none;
padding:12px;
border-radius:15px;
margin:6px;
}

/* INPUTS */
input,textarea,select{
width:90%;
padding:12px;
margin:6px;
border-radius:12px;
border:1px solid #d0e2ff;
}

/* CART */
#summary{
text-align:left;
font-size:14px;
}

/* DELETE */
.del{
background:#ff4d4d;
font-size:12px;
padding:5px 8px;
border-radius:8px;
margin-left:6px;
}

/* PRETTY RECEIPT */
.receipt{
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-top:10px;
text-align:left;
}

.line{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.small{
font-size:12px;
color:gray;
}

.total{
border-top:1px solid #ddd;
margin-top:10px;
padding-top:10px;
font-weight:bold;
font-size:16px;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
max-width:430px;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.nav button{
background:none;
color:#2f5fbf;
font-size:12px;
}

/* TIKTOK */
.tiktok{
box-shadow:0 0 10px #4d8dff;
}
</style>
</head>

<body>

<div class="app">

<div class="header">💙 Martinez’s Flowers</div>

<script>
let cart=[];
let finalText="";

/* NAV */
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* PRICE */
function price(t){
return {
Tulips:1.2,
Daisies:1.1,
Hibiscus:1.8,
Lilies:1.7,
"Tiger Lilies":1.9
}[t];
}

/* ADD */
function add(n,p,q){
cart.push({n,p,q});
update();
}

/* DELETE */
function removeItem(i){
cart.splice(i,1);
update();
}

/* CUSTOM */
function calc(){
est.innerText="Estimated: $"+Math.round(qty.value*price(type.value));
}

function addCustom(){
if(!qty.value) return;
cart.push({
n:type.value,
p:Math.round(qty.value*price(type.value)),
q:qty.value
});
update();
}

/* BOUQUET WITH BREAKDOWN */
function addMix(){
let total=0;
let desc="";

function line(n,q){
if(q>0){
let p=Math.round(q*price(n));
total+=p;
desc+=`${q}x ${n}, `;
}
}

line("Tulips",tulipQty.value);
line("Daisies",daisyQty.value);
line("Hibiscus",hibiscusQty.value);
line("Lilies",lilyQty.value);
line("Tiger Lilies",tigerQty.value);

if(total===0){
alert("Add flowers 💙");
return;
}

cart.push({
n:"Custom Bouquet",
p:total,
q:1,
extra:desc
});

update();
}

/* UPDATE CART */
function update(){
let html="";
let total=0;

cart.forEach((i,index)=>{
html+=`<div class="line">
<span>${i.q}x ${i.n}</span>
<span>$${i.p} <button class="del" onclick="removeItem(${index})">x</button></span>
</div>`;

if(i.extra){
html+=`<div class="small">${i.extra}</div>`;
}

total+=i.p;
});

if(msg.value && msg.value.trim()!==""){
total+=5;
html+=`<div class="line"><span>Message/Decor</span><span>$5</span></div>`;
}

summary.innerHTML=html||"No items yet";
totalEl.innerText="$"+total;
}

/* FINALIZE WITH PRETTY RECEIPT */
function finalizeOrder(){

if(cart.length===0){
alert("Add items first 💙");
return;
}

let total=0;
let html="";

cart.forEach(i=>{
html+=`<div class="line">
<span>${i.q}x ${i.n}</span>
<span>$${i.p}</span>
</div>`;

if(i.extra){
html+=`<div class="small">${i.extra}</div>`;
}

total+=i.p;
});

if(msg.value && msg.value.trim()!==""){
total+=5;
html+=`<div class="line"><span>Message/Decor</span><span>$5</span></div>`;
}

let info=`
<div class="small">🌸 Color: ${flowerColor.value}</div>
<div class="small">📦 ${method.value}</div>
<div class="small">📅 ${date.value} ${time.value}</div>
<div class="small">💳 ${paymentMethod.value}</div>
`;

let totalHTML=`<div class="total">Total: $${total}</div>`;

finalSummary.innerHTML=`<div class="receipt">${html}${info}${totalHTML}</div>`;

/* TEXT VERSION */
let text="🧾 Martinez’s Flowers Receipt\n\n";

cart.forEach(i=>{
text+=`${i.q}x ${i.n} - $${i.p}\n`;
if(i.extra) text+=i.extra+"\n";
});

if(msg.value && msg.value.trim()!==""){
text+="\n+ $5 Message/Decor";
}

text+=`\n\nColor: ${flowerColor.value}`;
text+=`\n${method.value} ${date.value} ${time.value}`;
text+=`\nPayment: ${paymentMethod.value}`;
text+=`\nTotal: $${total}`;

finalText=text;
}
</script>

<!-- KEEPING ALL YOUR ORIGINAL HTML EXACTLY THE SAME BELOW -->

<!-- HOME -->
<div id="home" class="page active">
<h3>🌼 My Story</h3>
<p>I’ve always been the kind of person who jumps from hobby to hobby.</p>
<p>But then I discovered making pipe cleaner flowers—and it stuck.</p>
<p>This is the first thing I stayed consistent with and felt proud of.</p>
</div>

<!-- FLOWERS -->
<div id="flowers" class="page">
<!-- (unchanged flower section) -->
</div>

<!-- ORDER -->
<div id="order" class="page">
<div class="card">

<select id="method">
<option>Pickup</option>
<option>Delivery</option>
</select>

<input type="date" id="date">
<input type="time" id="time">

<textarea id="msg" placeholder="Message (+$5)"></textarea>

<h4>💳 Payment</h4>
<select id="paymentMethod">
<option value="">Select payment</option>
<option>Apple Pay</option>
<option>Zelle</option>
<option>Cash</option>
<option>PayPal</option>
</select>

</div>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">
<div class="card">

<h3>🛒 Checkout</h3>

<div id="summary">No items yet</div>
<p id="totalEl">$0</p>

<button onclick="copy()">Copy</button>
<button onclick="send()">Send</button>
<button onclick="finalizeOrder()">✅ Finalize Order</button>

<div id="finalSummary"></div>

</div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
<p>📲 201-736-5461</p>

<button class="tiktok" onclick="window.open('https://www.tiktok.com/@martinezs.flowers?_r=1&_t=ZT-95flhn8xJzp')">
💙 Open My TikTok
</button>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('flowers')">Shop</button>
<button onclick="show('order')">Order</button>
<button onclick="show('payment')">Cart</button>
<button onclick="show('contact')">Contact</button>
</div>

<script>
function copy(){
navigator.clipboard.writeText(finalText || summary.innerText);
alert("Copied 💙");
}

function send(){
let text = finalText || summary.innerText;
window.open("sms:2017365461&body="+encodeURIComponent(text));
}
</script>

</body>
</html>
