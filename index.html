<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martinez’s Flower Designs 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Pacifico';
background:linear-gradient(#e6f2ff,#cce0ff);
}

nav{
background:#2f5fbf;
display:flex;
justify-content:space-around;
padding:12px;
}
nav button{
background:none;border:none;color:white;
}

.page{display:none;padding:20px;text-align:center;}
.active{display:block;}

.card{
background:white;
margin:12px auto;
padding:18px;
max-width:420px;
border-radius:18px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

button{
background:#4d8dff;
color:white;
border:none;
padding:10px;
border-radius:12px;
margin:5px;
}

input,textarea,select{
width:85%;
margin:6px;
padding:10px;
border-radius:10px;
border:1px solid #d0e2ff;
}

.color-btn{
display:inline-block;
padding:8px 14px;
margin:5px;
border-radius:20px;
background:#dbeaff;
cursor:pointer;
}

#thankYou{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:60px;
color:#2f5fbf;
opacity:0;
transition:all 0.5s;
z-index:9999;
}
#thankYou.show{
transform:translate(-50%,-50%) scale(1.5);
opacity:1;
}
</style>
</head>

<body>

<div id="thankYou">💙 THANK YOU 💙</div>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('flowers')">Flowers</button>
<button onclick="show('order')">Order</button>
<button onclick="show('payment')">Payment</button>
<button onclick="show('contact')">Contact</button>
</nav>

<script>
let cart=[];
let paperColor="";
let bouquetColor="";

/* NAV */
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* THANK YOU */
function showThanks(){
let el=document.getElementById("thankYou");
el.classList.add("show");
setTimeout(()=>el.classList.remove("show"),1200);
}

/* PRICE */
function price(t){
return {Tulips:1.2,Daisies:1.1,Hibiscus:1.8,Lilies:1.7,"Tiger Lilies":1.9}[t];
}

/* ADD */
function add(n,p,q){
cart.push({n,p,q});
update();
showThanks();
}

/* =========================
   ✨ CUSTOM ORDER (RESTORED)
========================= */
function calc(){
let q = qty.value;
if(!q)return;
est.innerText="Estimated: $"+Math.round(q*price(type.value));
}

function addCustom(){
let q = qty.value;
if(!q)return;
let p = Math.round(q*price(type.value));
cart.push({n:type.value,p:p,q:q});
update();
showThanks();
}

/* =========================
   💐 BOUQUET BUILDER (RESTORED FULL)
========================= */
function addMix(){
let total=0;
let desc="";

function line(n,q){
if(q>0){
let p=Math.round(q*price(n));
total+=p;
desc+=`${q}x ${n}, `;
}
}

line("Tulips",tulipQty.value);
line("Daisies",daisyQty.value);
line("Hibiscus",hibiscusQty.value);
line("Lilies",lilyQty.value);
line("Tiger Lilies",tigerQty.value);

if(total===0){
alert("Add flowers 💙");
return;
}

let mode = colorMode.value;

cart.push({
n:"Custom Bouquet",
p:total,
q:1,
extra:desc + " | " + mode
});

update();
showThanks();
}

/* =========================
   💰 CHECKOUT (FIX +$5)
========================= */
function update(){
let t="";
let total=0;

cart.forEach(i=>{
t+=`${i.q}x ${i.n} - $${i.p}\n`;
total+=i.p;
});

/* ✨ FIX: +$5 MESSAGE OPTION */
if(msg.value && msg.value.trim()!==""){
total += 5;
t += "\n+ $5 Decor/Message";
}

summary.innerText=t||"No items yet";
document.getElementById("total").innerText="$"+total;
}

/* COPY + SEND */
function copy(){
navigator.clipboard.writeText(summary.innerText);
alert("Copied 💙");
}

function send(){
window.open("sms:2017365461&body="+encodeURIComponent(summary.innerText));
}
</script>

<!-- HOME -->
<div id="home" class="page active">
<h1>💙 Martinez’s Flower Designs 💙</h1>
<p>Handmade pipe cleaner flowers 💐</p>
</div>

<!-- FLOWERS -->
<div id="flowers" class="page">

<div class="card">
<h3>🌷 Tulips</h3>
<button onclick="add('Tulips',9,7)">7 $9</button>
<button onclick="add('Tulips',16,15)">15 $16</button>
<button onclick="add('Tulips',28,25)">25 $28</button>
</div>

<div class="card">
<h3>🌼 Daisies</h3>
<button onclick="add('Daisies',8,7)">7 $8</button>
<button onclick="add('Daisies',15,15)">15 $15</button>
<button onclick="add('Daisies',27,25)">25 $27</button>
</div>

<div class="card">
<h3>🌺 Hibiscus</h3>
<button onclick="add('Hibiscus',12,7)">7 $12</button>
<button onclick="add('Hibiscus',22,15)">15 $22</button>
<button onclick="add('Hibiscus',40,25)">25 $40</button>
</div>

<div class="card">
<h3>🤍 Lilies</h3>
<button onclick="add('Lilies',12,7)">7 $12</button>
<button onclick="add('Lilies',23,15)">15 $23</button>
<button onclick="add('Lilies',42,25)">25 $42</button>
</div>

<div class="card">
<h3>🐯 Tiger Lilies</h3>
<button onclick="add('Tiger Lilies',13,7)">7 $13</button>
<button onclick="add('Tiger Lilies',25,15)">15 $25</button>
<button onclick="add('Tiger Lilies',45,25)">25 $45</button>
</div>

<!-- 💐 BOUQUET BUILDER (RESTORED) -->
<div class="card">
<h3>💐 Make Your Own Bouquet</h3>

<input id="tulipQty" type="number" placeholder="🌷 Tulips">
<input id="daisyQty" type="number" placeholder="🌼 Daisies">
<input id="hibiscusQty" type="number" placeholder="🌺 Hibiscus">
<input id="lilyQty" type="number" placeholder="🤍 Lilies">
<input id="tigerQty" type="number" placeholder="🐯 Tiger Lilies">

<select id="colorMode">
<option>Same Color</option>
<option>Mixed Colors</option>
</select>

<button onclick="addMix()">Add Bouquet 💙</button>
</div>

<!-- ✨ CUSTOM ORDER (RESTORED) -->
<div class="card">
<h3>✨ Custom Order</h3>

<select id="type">
<option>Tulips</option>
<option>Daisies</option>
<option>Hibiscus</option>
<option>Lilies</option>
<option>Tiger Lilies</option>
</select>

<input id="qty" type="number" placeholder="Amount">
<p id="est">Estimated: $0</p>

<button onclick="calc()">Calculate</button>
<button onclick="addCustom()">Add</button>
</div>

</div>

<!-- ORDER -->
<div id="order" class="page">
<input id="msg" placeholder="Message (+$5)">
</div>

<!-- PAYMENT -->
<div id="payment" class="page">

<div class="card">
<h2>🛒 Checkout</h2>

<pre id="summary">No items yet</pre>
<p id="total">$0</p>

<button onclick="copy()">Copy</button>
<button onclick="send()">Send</button>

</div>

</div>

<!-- CONTACT -->
<div id="contact" class="page">

<p>📲 201-736-5461</p>

</div>

</body>
</html>
